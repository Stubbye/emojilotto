name: EmojiLotto Automator
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install -g ts-node typescript
      - run: npm install @coral-xyz/anchor @solana/web3.js bs58
      - name: Write keypair
        run: echo '${{ secrets.AUTHORITY_KEYPAIR }}' > authority-keypair.json
      - name: Write IDL
        run: echo '${{ secrets.IDL_JSON }}' > idl.json
      - name: Run automator
        env:
          PROGRAM_ID: ${{ secrets.PROGRAM_ID }}
          NETWORK: ${{ secrets.NETWORK }}
          RPC_ENDPOINT: ${{ secrets.RPC_ENDPOINT }}
        run: ts-node scripts/automator.ts
